<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fila Virtual Paradero</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.header{background:#020617;padding:15px;text-align:center;font-size:22px;}
.container{padding:15px;max-width:900px;margin:auto;}

.card{border-radius:16px;padding:15px;margin-bottom:15px;}
.turno{background:#065f46;}
.espera{background:#78350f;}
.salida{background:#7f1d1d;}

.titulo{font-size:18px;margin-bottom:10px;font-weight:bold;}

.item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.1);font-size:18px;}

.pos{font-weight:bold;margin-right:10px;}
.movil{font-weight:bold;}

.btn{
width:100%;
padding:12px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
background:#2563eb;
color:white;
}

.btn-green{background:#16a34a;}
</style>
</head>

<body>

<div class="header">🚐 FILA VIRTUAL PARADERO</div>

<div class="container">

<div class="card turno">
<div class="titulo">🟢 SU TURNO</div>
<div id="turno">Cargando...</div>
</div>

<div class="card espera">
<div class="titulo">🟡 EN ESPERA</div>
<div id="espera">Cargando...</div>
</div>

<div class="card salida">
<div class="titulo">🔴 ÚLTIMA SALIDA</div>
<div id="salida">Cargando...</div>
</div>

<button class="btn btn-green" onclick="checkLocation()">➕ Registrarse</button>
<button class="btn" onclick="cargarDatos()">Actualizar</button>

</div>

<script>

// 🔗 API
const API = "https://script.google.com/macros/s/AKfycbyId0B1FrasnydfD3Ru8b4oQxieZJ05NuXImIFuL-UqFxqyLUImP1avdPqlRqMVHQRx/exec";

// 📍 FORM
const FORM = "https://docs.google.com/forms/d/e/1FAIpQLScqQdDzJeOOmrT069IlGXWBRbXrqXS5D8ow9VSRCjLL30T6dQ/viewform";

// 📍 GEO CONFIG
const PARADERO_LAT = -33.732260;
const PARADERO_LON = -70.735436;
const RADIO = 200; // metros

// 📥 CARGAR DATOS
async function cargarDatos(){
  const res = await fetch(API + "?t=" + new Date().getTime(), {cache:"no-store"});
  const data = await res.json();

  document.getElementById("turno").innerHTML =
    data.turno.length
      ? data.turno.map(t => `<div class="item">Móvil ${t.movil}</div>`).join("")
      : "Sin vehículos";

  document.getElementById("espera").innerHTML =
    data.espera.length
      ? data.espera.map((e,i) =>
        `<div class="item">
          <span class="pos">N° ${i+3}</span>
          <span class="movil">Móvil ${e.movil}</span>
        </div>`
      ).join("")
      : "Sin espera";

  document.getElementById("salida").innerHTML =
    data.salida.length
      ? data.salida.map(s =>
        `<div class="item">Móvil ${s.movil}</div>`
      ).join("")
      : "Sin registros";
}

// 📏 DISTANCIA
function distancia(lat1, lon1, lat2, lon2){
  const R = 6371e3;
  const toRad = x => x*Math.PI/180;

  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);

  const a = Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 📍 VALIDAR UBICACIÓN
function checkLocation(){

  if(!navigator.geolocation){
    alert("Tu dispositivo no permite ubicación");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const d = distancia(lat, lon, PARADERO_LAT, PARADERO_LON);

    if(d <= RADIO){
      window.open(FORM, "_blank");
    }else{
      alert("❌ Debes estar en el paradero para registrarte");
    }

  }, () => {
    alert("Debes permitir la ubicación");
  });

}

// AUTO
window.onload = cargarDatos;
setInterval(cargarDatos,10000);

</script>

</body>
</html>

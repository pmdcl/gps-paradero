<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fila Virtual Paradero</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:#0f172a;
  color:white;
}

.header{
  background:#020617;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:15px;
  max-width:900px;
  margin:auto;
}

.card{
  border-radius:16px;
  padding:15px;
  margin-bottom:15px;
}

.turno{ background:#065f46; }
.espera{ background:#78350f; }
.salida{ background:#7f1d1d; }

.titulo{
  font-size:18px;
  margin-bottom:10px;
  font-weight:bold;
}

.item{
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
  font-size:18px;
}

.pos{
  font-weight:bold;
  margin-right:10px;
}

.movil{
  font-weight:bold;
}

.btn{
  width:100%;
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  background:#2563eb;
  color:white;
}
</style>
</head>

<body>

<div class="header">🚐 FILA VIRTUAL PARADERO</div>

<div class="container">

  <!-- TURNO -->
  <div class="card turno">
    <div class="titulo">🟢 SU TURNO</div>
    <div id="turno"></div>
  </div>

  <!-- ESPERA -->
  <div class="card espera">
    <div class="titulo">🟡 EN ESPERA</div>
    <div id="espera"></div>
  </div>

  <!-- SALIDA -->
  <div class="card salida">
    <div class="titulo">🔴 ÚLTIMA SALIDA</div>
    <div id="salida"></div>
  </div>

  <button class="btn" onclick="cargarDatos()">Actualizar</button>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzyer2eFTuP2wokfDh7qjj7wRnAKqHShPFSe9BprzhPcl_3pgQFEm3ivTGziN_S6r5X/exec";

async function cargarDatos(){

  try{
    const res = await fetch(API);
    const data = await res.json();

    // TURNOS
    document.getElementById("turno").innerHTML =
      data.turno.length
        ? data.turno.map(t =>
          `<div class="item">Móvil ${t.movil}</div>`
        ).join("")
        : "Sin vehículos";

    // ESPERA
    document.getElementById("espera").innerHTML =
      data.espera.length
        ? data.espera.map((e,i) =>
          `<div class="item">
            <span class="pos">N° ${i+3}</span>
            <span class="movil">Móvil ${e.movil}</span>
          </div>`
        ).join("")
        : "Sin espera";

    // SALIDA
    document.getElementById("salida").innerHTML =
      data.salida.length
        ? data.salida.map(s =>
          `<div class="item">Móvil ${s.movil}</div>`
        ).join("")
        : "Sin registros";

  }catch(err){
    console.error(err);
  }
}

// carga inicial
cargarDatos();

// actualización automática cada 10 segundos
setInterval(cargarDatos,10000);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fila Virtual</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.header{padding:15px;text-align:center;font-size:22px;background:#020617;}
.container{padding:15px;max-width:900px;margin:auto;}
.card{padding:15px;border-radius:15px;margin-bottom:15px;}
.turno{background:#065f46;}
.espera{background:#78350f;}
.salida{background:#7f1d1d;}
.item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.1);}
.pos{font-weight:bold;margin-right:10px;}
.movil{font-weight:bold;}
.btn{width:100%;padding:12px;margin-top:10px;background:#2563eb;color:white;border:none;border-radius:10px;}
</style>
</head>

<body>

<div class="header">🚐 FILA VIRTUAL PARADERO</div>

<div class="container">

<div class="card turno">
<div>🟢 SU TURNO</div>
<div id="turno"></div>
</div>

<div class="card espera">
<div>🟡 EN ESPERA</div>
<div id="espera"></div>
</div>

<div class="card salida">
<div>🔴 ÚLTIMA SALIDA</div>
<div id="salida"></div>
</div>

<button class="btn" onclick="cargarDatos()">Actualizar</button>

</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vSXJbNz31wMpneH5Xohkd8YTyeA57HhYkAOa05PgLOcUkWK3JwHyss9EJR1vYk4z4YftRl_J_zdVU8R/pub?gid=1499579513&single=true&output=csv";

let ultimoEstado = null; // 🔒 evita retrocesos

async function cargarDatos(){

  const res = await fetch(CSV + "&t=" + new Date().getTime(), {cache:"no-store"});
  const text = await res.text();

  const filas = text.trim().split("\n").slice(1);

  let registros = filas.map(f=>{
    const c=f.split(",");
    return {
      fecha:new Date(c[0]),
      movil:c[1],
      accion:c[2].trim()
    };
  });

  // 🔥 ORDENAMOS TODO POR FECHA (clave)
  registros.sort((a,b)=>a.fecha-b.fecha);

  let estado = {};
  let salidas = [];

  registros.forEach(r=>{
    if(r.accion==="Ingreso"){
      estado[r.movil]={estado:"fila",hora:r.fecha};
    }
    else if(r.accion==="Salida"){
      estado[r.movil]={estado:"salio",hora:r.fecha};
      salidas.push({movil:r.movil,hora:r.fecha});
    }
    else if(r.accion==="Abandonar"){
      delete estado[r.movil];
    }
  });

  // 🔒 evitar retrocesos
  const estadoJSON = JSON.stringify({estado,salidas});
  if(ultimoEstado && estadoJSON < ultimoEstado) return;
  ultimoEstado = estadoJSON;

  let fila = Object.entries(estado)
    .filter(([_,v])=>v.estado==="fila")
    .map(([movil,v])=>({movil, hora:v.hora}));

  fila.sort((a,b)=>a.hora-b.hora);
  salidas.sort((a,b)=>b.hora-a.hora);

  const turno = fila.slice(0,2);
  const espera = fila.slice(2);
  const ultimas = salidas.slice(0,2);

  document.getElementById("turno").innerHTML =
    turno.map(t=>`<div class="item">Móvil ${t.movil}</div>`).join("") || "Sin vehículos";

  document.getElementById("espera").innerHTML =
    espera.map((e,i)=>`<div class="item"><span class="pos">N° ${i+3}</span>Móvil ${e.movil}</div>`).join("") || "Sin espera";

  document.getElementById("salida").innerHTML =
    ultimas.map(s=>`<div class="item">Móvil ${s.movil}</div>`).join("") || "Sin registros";
}

cargarDatos();
setInterval(cargarDatos,15000);

</script>

</body>
</html>

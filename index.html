<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Panel de Turnos</title>

  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#0f172a;
      color:white;
      text-align:center;
      padding:20px;
    }

    h1{
      margin-bottom:30px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:15px;
      margin:20px auto;
      max-width:400px;
      box-shadow:0 0 15px rgba(0,0,0,0.4);
    }

    .titulo{
      font-size:22px;
      margin-bottom:10px;
      color:#38bdf8;
    }

    .dato{
      font-size:28px;
      font-weight:bold;
      line-height:1.6;
    }

    button{
      margin-top:30px;
      padding:15px 25px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      background:#16a34a;
    }
  </style>
</head>

<body>

<h1>🚐 Panel de Turnos</h1>

<div class="card">
  <div class="titulo">En Turno</div>
  <div id="turno" class="dato">Cargando...</div>
</div>

<div class="card">
  <div class="titulo">Última Salida</div>
  <div id="ultima" class="dato">Cargando...</div>
</div>

<button onclick="cargarDatos()">Actualizar</button>

<script>
const CSV_BASE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSXJbNz31wMpneH5Xohkd8YTyeA57HhYkAOa05PgLOcUkWK3JwHyss9EJR1vYk4z4YftRl_J_zdVU8R/pub?gid=1499579513&single=true&output=csv";

async function cargarDatos() {
  try {
    // 🔥 Evita cache → siempre trae datos nuevos
    const url = CSV_BASE + "&t=" + new Date().getTime();

    const response = await fetch(url, { cache: "no-store" });
    const data = await response.text();

    procesarCSV(data);

  } catch (error) {
    console.error("Error:", error);
  }
}

function procesarCSV(csv) {
  const filas = csv.trim().split("\n").slice(1); // quitar encabezados

  if (filas.length === 0) {
    document.getElementById("turno").innerHTML = "Sin registros";
    document.getElementById("ultima").innerHTML = "Sin registros";
    return;
  }

  // Convertir filas a array
  const registros = filas.map(fila => fila.split(","));

  // 🚐 PRIMEROS 2 = EN TURNO
  const turno = registros.slice(0, 2);

  // 🚐 ÚLTIMOS 2 = ÚLTIMA SALIDA
  const ultimaSalida = registros.slice(-2);

  document.getElementById("turno").innerHTML =
    turno.map(r => r[1]).join("<br>");

  document.getElementById("ultima").innerHTML =
    ultimaSalida.map(r => r[1]).join("<br>");
}

// Cargar automáticamente al abrir la página
cargarDatos();
</script>

</body>
</html>

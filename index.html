<!DOCTYPE html>
<html>
<head>
  <link rel="manifest" href="manifest.json">

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
<meta charset="UTF-8">
<title>Verificando ubicación...</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.card{
  background:#1e293b;
  padding:40px;
  border-radius:20px;
  max-width:400px;
}

.loader{
  font-size:20px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">
  <h2>📍 Verificando ubicación</h2>
  <div class="loader">Espera un momento…</div>
</div>

<script>
const PARADERO_LAT = -33.73228331583348;
const PARADERO_LON = -70.73539815703865;
const RADIO_METROS = 200;

function toRad(v){ return v*Math.PI/180; }

function distanciaMetros(lat1, lon1, lat2, lon2){
  const R = 6371e3;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);

  const a = Math.sin(dLat/2)**2 +
  Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
  Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

navigator.geolocation.getCurrentPosition(function(pos){

  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const distancia = distanciaMetros(lat, lon, PARADERO_LAT, PARADERO_LON);

  if(distancia <= RADIO_METROS){
    window.location.href =
    "https://docs.google.com/forms/d/e/1FAIpQLScqQdDzJeOOmrT069IlGXWBRbXrqXS5D8ow9VSRCjLL30T6dQ/viewform?usp=header";
  }else{
    document.body.innerHTML =
    "<div class='card'><h2>❌ No estás en el paradero</h2><p>Debes estar dentro del área para registrarte.</p></div>";
  }

}, function(){
  alert("Debes permitir la ubicación para registrarte.");
});
</script>

</body>
</html>
